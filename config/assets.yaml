# Nysa Risk Engine — Asset Universe Configuration
#
# Source of truth for the assets covered by the risk parameter pipeline.
# Each collateral is calibrated against every admissible borrowable
# (per-pair methodology, see docs/nysa-market-risk-framework.md §3.3:
# published LT per collateral = min over its pairs).
#
# `underlying_ticker` is the data-extraction proxy: GM tokens track the
# NAV of their underlying, whose long price history (yfinance) is used to
# estimate sigma_stress. On-chain GM token history, where available, is
# used only to validate tracking (basis token/NAV).
#
# Fields left as `null` are business/deployment inputs to be filled
# before calibration (addresses, chains, per-asset execution costs).

meta:
  version: 0.1
  base_currency: USD
  price_history_years: 10          # underlying daily history to extract
  include_overnight_gaps: true     # close-to-open returns are risk-relevant (gap risk)

