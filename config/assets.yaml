borrowables:
  # ---- Crypto — Lending & Borrowing (also usable as collateral) ----
  # Borrowables are lend/borrow-only; they never sit on the collateral
  # side of a pair, so no execution_cost is needed here.
  - symbol: WBTC
    type: crypto
    category: wrapped
    price_source: BTC-USD          # yfinance ticker proxy for long history
    use: lending_and_borrowing
    volatility_class: volatile     # borrow cap must also respect secondary depth (docs/nysa-lb-caps.md §3.1)
  - symbol: WETH
    type: crypto
    category: wrapped
    price_source: ETH-USD
    use: lending_and_borrowing
    volatility_class: volatile
  - symbol: BNB
    type: crypto
    category: native
    price_source: BNB-USD
    use: lending_and_borrowing
    volatility_class: volatile
  - symbol: USDC
    type: crypto
    category: stable
    price_source: USDC-USD
    use: lending_and_borrowing
    volatility_class: stable
  - symbol: USDT
    type: crypto
    category: stable
    price_source: USDT-USD
    use: lending_and_borrowing
    volatility_class: stable

# Admissible collateral -> borrowable pairs.
# Direction is strictly collateral -> borrowable. Assets flagged
# `use: lending_and_borrowing` never appear on the collateral side.
#
# Exclusion entries support wildcards on either side:
#   - {borrowable: BNB}         -> exclude every collateral against BNB
#   - {collateral: SLVon}       -> exclude SLVon against every borrowable
#   - {collateral: X, borrowable: Y}  -> exclude the specific pair
# Legacy [X, Y] two-lists are still accepted (equivalent to the last form).
pairs:
  default_policy: all_collaterals_vs_all_borrowables
  exclusions: []                   # every RWA collateral is admissible against every borrowable
                                   # (E-Mode-restricted policies live under `emode_categories` below)

# E-Mode categories — contractually-scoped borrowable sets.
# A borrower opting into an E-Mode category can only borrow assets from
# that category, and the collateral gets a category-specific LT computed
# by taking the min-rule over the category's borrowables only. See
# `nysa_risk.parameters.lt` docstring for the soundness argument.
emode_categories:
  stable:
    borrowables: [USDC, USDT]

# Ondo session limits (supply cap inputs) — fetched per asset from the API,
# not hardcoded here. See docs/nysa-lb-caps.md §2.1.
ondo:
  limits_api: "https://docs.ondo.finance/api-reference/limits/get-session-limits"
  status_page: "https://status.ondo.finance/market"
  api_key_env: ONDO_API_KEY        # set in environment, never committed

# Calibration constants (single source of truth for the parameter modules;
# mirrors RiskConfig — see docs/nysa-market-risk-framework.md)
calibration:
  ewma_lambda: 0.94                # §3.1 sigma_stress row
  stress_quantile: 0.95            # percentile of EWMA vol series (sigma_stress, C_T/LT only)
  gap_sigma_quantile: 0.90         # percentile of EWMA vol series (sigma_gap, LTV gap buffer G only)
  es_factor: 3.5                   # fat-tailed ES multiplier @99% (Student-t ~4 dof)
  t_liq_days: 0.3333               # pessimistic liquidation window (8h); revisit per gap-at-open
  t_user_days: 3.0                 # borrower reaction horizon incl. weekends (§4.1)
  k_user: 1.53                     # fat-tailed 90% quantile multiplier (§4.1)
  stressed_liquidatable_share: 0.25  # supply cap scenario parameter (docs/nysa-lb-caps.md §2.1)
  rf_theta: 0.01                   # reserve target as share of debt (§6.1)
  rf_horizon_years: 0.83           # ~10 months accumulation (§6.1)
  emode_min_advantage: 0.05        # min LT gain (fraction) required for an E-Mode row to be shown
  target_liq30_emode: [0.10, 0.15] # acceptance band for P(liq ≤ 30d) at e-mode LTV (backtest_curves --calibrate)
  target_liq30_std: [0.10, 0.15]   # acceptance band for P(liq ≤ 30d) at standard LTV
  minimum_gap: 0.02                # calibrated LTV hard ceiling: LTV ≤ LT − minimum_gap
  max_uncond_bad_debt: 0.004       # calibrate.py constraint (3): bad-debt events / non-censored openings
  min_calibration_years: 3.0       # calibrate.py short-history guard: raises need ≥ this much pair history
  severity_review_threshold: 0.05  # calibrate.py: max excess loss beyond 1 − LT that triggers an LT REVIEW flag
  max_loss_given_bad_debt: 0.065   # calibrate.py LT pass: declared severity bound — worst per-position excess beyond 1 − LT
